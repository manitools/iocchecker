<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk VirusTotal IOC Analyzer</title>
    <!-- Tailwind CSS for clean, modern styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .json-tree { font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-6">

    <div class="max-w-7xl mx-auto space-y-6">
        <!-- Header -->
        <header class="border-b border-slate-700 pb-4">
            <h1 class="text-3xl font-bold tracking-tight text-teal-400">Bulk VirusTotal IOC Analyzer</h1>
            <p class="text-slate-400 text-sm mt-1">Analyze hashes, IPs, and URLs directly from your browser.</p>
        </header>

        <!-- Configuration Panel -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 bg-slate-800 p-6 rounded-xl shadow-md border border-slate-700">
            <!-- Credentials & Setup -->
            <div class="space-y-4 md:col-span-1">
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-1">VirusTotal API Key (v3)</label>
                    <input type="password" id="apiKey" class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-teal-500 text-white" placeholder="Paste your API key here">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-1">CORS Bypass Proxy</label>
                    <input type="text" id="proxyUrl" class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-teal-500 text-white" value="https://cors-anywhere.herokuapp.com/" placeholder="e.g., http://localhost:8080/">
                    <p class="text-xs text-slate-500 mt-1">Required to prevent browser CORS blocks. If using the default demo proxy, you may need to visit it first to grant temporary access.</p>
                </div>
                <div class="pt-2">
                    <button id="processBtn" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-semibold py-2 px-4 rounded transition-colors text-sm shadow cursor-pointer">
                        Analyze IOCs
                    </button>
                </div>
            </div>

            <!-- IOC Input Area -->
            <div class="md:col-span-2 flex flex-col">
                <label class="block text-sm font-semibold text-slate-300 mb-1">IOC List (One per line)</label>
                <textarea id="iocInput" class="w-full flex-grow bg-slate-900 border border-slate-600 rounded p-3 text-sm focus:outline-none focus:border-teal-500 text-white font-mono min-h-[180px]" placeholder="Paste hashes (MD5/SHA1/SHA256)&#10;Paste IP addresses (IPv4)&#10;Paste URLs (e.g., http://malicious.com)"></textarea>
            </div>
        </div>

        <!-- Progress and Status Indicator -->
        <div id="statusPanel" class="hidden bg-slate-800 p-4 rounded-xl border border-slate-700 items-center justify-between">
            <div class="flex items-center space-x-3">
                <span class="animate-spin inline-block w-4 h-4 border-2 border-teal-500 border-t-transparent rounded-full"></span>
                <span id="statusText" class="text-sm font-medium">Processing...</span>
            </div>
            <div class="w-48 bg-slate-700 rounded-full h-2.5">
                <div id="progressBar" class="bg-teal-500 h-2.5 rounded-full" style="width: 0%"></div>
            </div>
        </div>

        <!-- Results Toolbar -->
        <div id="resultsToolbar" class="hidden flex justify-between items-center bg-slate-800 p-4 rounded-xl border border-slate-700">
            <h2 class="text-lg font-bold text-slate-200">Analysis Results (<span id="resultCount">0</span>)</h2>
            <div class="space-x-2">
                <button onclick="exportData('csv')" class="bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs font-semibold py-1.5 px-3 rounded cursor-pointer">Export CSV</button>
                <button onclick="exportData('json')" class="bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs font-semibold py-1.5 px-3 rounded cursor-pointer">Export JSON</button>
            </div>
        </div>

        <!-- Results Display -->
        <div id="resultsContainer" class="space-y-4"></div>
    </div>

    <!-- Application JavaScript Logic -->
    <script>
        let globalResults = [];

        // Helper: Base64 URL safe encoding without padding (Required by VirusTotal v3 for URLs)
        function base64UrlEncode(url) {
            return btoa(url).replace(/=/g, "").replace(/\+/g, "-").replace(/\//g, "_");
        }

        // Helper: Detect the type of IOC based on patterns
        function detectIocType(ioc) {
            const clean = ioc.trim();
            const ipRegex = /^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$/;
            const md5Regex = /^[a-fA-E0-9]{32}$/i;
            const sha1Regex = /^[a-fA-E0-9]{40}$/i;
            const sha256Regex = /^[a-fA-E0-9]{64}$/i;
            
            if (ipRegex.test(clean)) return 'ip';
            if (md5Regex.test(clean) || sha1Regex.test(clean) || sha256Regex.test(clean)) return 'hash';
            if (clean.startsWith('http://') || clean.startsWith('https://') || clean.includes('.')) return 'url';
            return 'unknown';
        }

        // Action: Core logic to process the collection of IOCs
        document.getElementById('processBtn').addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const proxyUrl = document.getElementById('proxyUrl').value.trim();
            const rawIocs = document.getElementById('iocInput').value.split('\n');
            
            if (!apiKey) {
                alert('Please provide a valid VirusTotal API Key.');
                return;
            }

            const iocs = rawIocs.map(i => i.trim()).filter(i => i.length > 0);
            if (iocs.length === 0) {
                alert('Please enter at least one IOC to check.');
                return;
            }

            // UI Setup
            globalResults = [];
            document.getElementById('resultsContainer').innerHTML = '';
            const statusPanel = document.getElementById('statusPanel');
            const statusText = document.getElementById('statusText');
            const progressBar = document.getElementById('progressBar');
            statusPanel.classList.remove('hidden');
            statusPanel.classList.add('flex');

            for (let i = 0; i < iocs.length; i++) {
                const ioc = iocs[i];
                const type = detectIocType(ioc);
                
                statusText.innerText = `Analyzing (${i + 1}/${iocs.length}): ${ioc}`;
                progressBar.style.width = `${((i + 1) / iocs.length) * 100}%`;

                let endpoint = '';
                if (type === 'hash') endpoint = `files/${ioc}`;
                else if (type === 'ip') endpoint = `ip_addresses/${ioc}`;
                else if (type === 'url') endpoint = `urls/${base64UrlEncode(ioc)}`;

                let resultData = { ioc, type, status: 'Error', malicious: 0, harmless: 0, total: 0, details: null };

                if (type === 'unknown') {
                    resultData.status = 'Unsupported Type';
                    appendResultCard(resultData);
                    globalResults.push(resultData);
                    continue;
                }

                try {
                    // Combine proxy target URL with VT Endpoint
                    const targetUrl = `https://www.virustotal.com/api/v3/${endpoint}`;
                    const response = await fetch(proxyUrl + targetUrl, {
                        method: 'GET',
                        headers: {
                            'x-apikey': apiKey,
                            'Accept': 'application/json'
                        }
                    });

                    if (response.ok) {
                        const json = await response.json();
                        const stats = json.data?.attributes?.last_analysis_stats || {};
                        resultData.status = 'Success';
                        resultData.malicious = stats.malicious || 0;
                        resultData.harmless = stats.harmless || 0;
                        resultData.total = Object.values(stats).reduce((a, b) => a + b, 0);
                        resultData.details = json.data;
                    } else {
                        resultData.status = `HTTP ${response.status}: ${response.statusText}`;
                    }
                } catch (err) {
                    resultData.status = `Proxy/Network Exception`;
                    console.error(err);
                }

                appendResultCard(resultData);
                globalResults.push(resultData);
                
                // Slight cooling delay to respect API rate limits (especially for standard keys)
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            statusPanel.classList.remove('flex');
            statusPanel.classList.add('hidden');
            document.getElementById('resultsToolbar').classList.remove('hidden');
            document.getElementById('resultCount').innerText = globalResults.length;
        });

        // UI Component: Render the detailed card structure for each IOC
        function appendResultCard(res) {
            const container = document.getElementById('resultsContainer');
            const cardId = 'card_' + Math.random().toString(36).substr(2, 9);
            
            let badgeColor = 'bg-slate-700 text-slate-300';
            if (res.status === 'Success') {
                badgeColor = res.malicious > 0 ? 'bg-rose-500/20 text-rose-400 border border-rose-500/30' : 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30';
            }

            const cardHtml = `
                <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden shadow-sm">
                    <div class="p-4 flex flex-wrap items-center justify-between gap-4 bg-slate-800/50">
                        <div class="flex items-center space-x-3 min-w-0 flex-1">
                            <span class="text-xs uppercase px-2 py-0.5 rounded bg-slate-900 font-semibold tracking-wider text-slate-400">${res.type}</span>
                            <span class="font-mono font-medium text-slate-200 truncate block text-sm select-all">${res.ioc}</span>
                        </div>
                        <div class="flex items-center space-x-3 shrink-0">
                            <span class="text-xs px-2.5 py-1 rounded-full font-medium ${badgeColor}">
                                ${res.status === 'Success' ? `${res.malicious}/${res.total} Detections` : res.status}
                            </span>
                            ${res.details ? `
                            <button onclick="toggleAccordion('${cardId}')" class="text-slate-400 hover:text-white text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded transition-colors cursor-pointer">
                                View Full Data
                            </button>` : ''}
                        </div>
                    </div>
                    
                    <!-- Expandable Data Section -->
                    <div id="${cardId}" class="hidden border-t border-slate-700 bg-slate-950 p-4 overflow-x-auto">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4 text-xs border-b border-slate-800 pb-4">
                            <div>
                                <p class="text-slate-400 mb-1"><strong class="text-slate-300">Engine Breakdown:</strong></p>
                                <p class="text-rose-400">Malicious: ${res.details?.attributes?.last_analysis_stats?.malicious || 0}</p>
                                <p class="text-amber-400">Suspicious: ${res.details?.attributes?.last_analysis_stats?.suspicious || 0}</p>
                                <p class="text-emerald-400">Harmless: ${res.details?.attributes?.last_analysis_stats?.harmless || 0}</p>
                                <p class="text-slate-400">Undetected: ${res.details?.attributes?.last_analysis_stats?.undetected || 0}</p>
                            </div>
                            <div>
                                <p class="text-slate-400 mb-1"><strong class="text-slate-300">Metadata Context:</strong></p>
                                <p>Reputation Score: ${res.details?.attributes?.reputation || 0}</p>
                                <p class="truncate">Context Info: ${res.details?.attributes?.meaning || res.details?.attributes?.as_owner || 'N/A'}</p>
                            </div>
                        </div>
                        <p class="text-xs font-semibold text-teal-400 mb-2">Raw Response Attributes JSON:</p>
                        <pre class="json-tree text-slate-300">${JSON.stringify(res.details?.attributes || {}, null, 2)}</pre>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', cardHtml);
        }

        function toggleAccordion(id) {
            const el = document.getElementById(id);
            el.classList.toggle('hidden');
        }

        // Action: Handling format structure exports
        function exportData(format) {
            if (globalResults.length === 0) return;

            if (format === 'json') {
                const blob = new Blob([JSON.stringify(globalResults, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `vt_analysis_${Date.now()}.json`;
                a.click();
            } else if (format === 'csv') {
                let csvRows = ['IOC,Type,Status,Malicious_Detections,Total_Engines,Reputation'];
                globalResults.forEach(r => {
                    const rep = r.details?.attributes?.reputation || 0;
                    csvRows.push(`"${r.ioc}","${r.type}","${r.status}",${r.malicious},${r.total},${rep}`);
                });
                const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `vt_analysis_${Date.now()}.csv`;
                a.click();
            }
        }
    </script>
</body>
</html>
