<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Engine IOC Checker</title>
    <!-- Tailwind CSS for modern, clean UI -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <header class="mb-8 border-b border-slate-800 pb-6">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                <i class="fa-solid px-2 fa-shield-halved"></i>Multi-Engine IOC Checker
            </h1>
            <p class="text-slate-400 mt-2">Analyze IPs, Domains, URLs, and Hashes across multiple threat intelligence platforms simultaneously.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Side: Configuration & Inputs -->
            <div class="lg:col-span-1 space-y-6">
                
                <!-- API Keys Card -->
                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-blue-400">
                        <i class="fa-solid fa-key"></i> API Configurations
                    </h2>
                    <div class="space-y-4 text-sm">
                        <div>
                            <label class="block text-slate-300 font-medium mb-1">VirusTotal Key</label>
                            <input type="password" id="vt-key" class="w-full bg-slate-900 border border-slate-700 rounded p-2 focus:outline-none focus:border-blue-500" placeholder="Paste VT API Key">
                        </div>
                        <div>
                            <label class="block text-slate-300 font-medium mb-1">AbuseIPDB Key</label>
                            <input type="password" id="abuseipdb-key" class="w-full bg-slate-900 border border-slate-700 rounded p-2 focus:outline-none focus:border-blue-500" placeholder="Paste AbuseIPDB Key">
                        </div>
                        <div>
                            <label class="block text-slate-300 font-medium mb-1">AlienVault OTX Key</label>
                            <input type="password" id="otx-key" class="w-full bg-slate-900 border border-slate-700 rounded p-2 focus:outline-none focus:border-blue-500" placeholder="Paste OTX API Key">
                        </div>
                        <div>
                            <label class="block text-slate-300 font-medium mb-1">URLScan.io Key</label>
                            <input type="password" id="urlscan-key" class="w-full bg-slate-900 border border-slate-700 rounded p-2 focus:outline-none focus:border-blue-500" placeholder="Paste URLScan Key">
                        </div>
                        <div class="pt-2 flex gap-2">
                            <button onclick="saveKeys()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-medium py-1.5 px-3 rounded text-xs transition">
                                Save Keys (Local)
                            </button>
                            <button onclick="clearKeys()" class="bg-red-950/40 hover:bg-red-900/60 text-red-400 font-medium py-1.5 px-3 rounded text-xs transition">
                                Clear
                            </button>
                        </div>
                    </div>
                </div>

                <!-- IOC Input Card -->
                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-emerald-400">
                        <i class="fa-solid fa-list-check"></i> Input Indicators
                    </h2>
                    <div>
                        <label class="block text-sm text-slate-400 mb-2">Enter one IOC per line (IP, Domain, URL, or MD5/SHA1/SHA256 Hash):</label>
                        <textarea id="ioc-input" rows="10" class="w-full bg-slate-900 border border-slate-700 rounded p-3 font-mono text-sm focus:outline-none focus:border-emerald-500 text-emerald-400" placeholder="1.1.1.1&#10;bad-domain.com&#10;https://malicious-site.net/path&#10;44d88612fea8a8f36de82e1278abb02f"></textarea>
                    </div>
                    <button onclick="processIOCs()" class="w-full mt-4 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-bold py-2.5 px-4 rounded-lg shadow transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-play"></i> Run Multi-Check
                    </button>
                </div>

            </div>

            <!-- Right Side: Results Presentation -->
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl min-h-[500px]">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold flex items-center gap-2">
                            <i class="fa-solid fa-square-poll-horizontal text-purple-400"></i> Assessment Results
                        </h2>
                        <button onclick="clearResults()" class="text-sm text-slate-400 hover:text-slate-200">Clear Table</button>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b border-slate-700 text-slate-400 text-sm">
                                    <th class="pb-3 font-semibold">Indicator</th>
                                    <th class="pb-3 font-semibold">Type</th>
                                    <th class="pb-3 font-semibold">Engine Results</th>
                                </tr>
                            </thead>
                            <tbody id="results-table-body" class="divide-y divide-slate-800 text-sm">
                                <tr>
                                    <td colspan="3" class="text-center py-12 text-slate-500">No indicators evaluated yet. Enter data and click Run.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript Logic handles detection and dynamic API requests -->
    <script>
        // Load saved keys on init
        window.onload = function() {
            if(localStorage.getItem('vt_key')) document.getElementById('vt-key').value = localStorage.getItem('vt_key');
            if(localStorage.getItem('abuseipdb_key')) document.getElementById('abuseipdb-key').value = localStorage.getItem('abuseipdb_key');
            if(localStorage.getItem('otx_key')) document.getElementById('otx-key').value = localStorage.getItem('otx_key');
            if(localStorage.getItem('urlscan_key')) document.getElementById('urlscan-key').value = localStorage.getItem('urlscan_key');
        };

        function saveKeys() {
            localStorage.setItem('vt_key', document.getElementById('vt-key').value);
            localStorage.setItem('abuseipdb_key', document.getElementById('abuseipdb-key').value);
            localStorage.setItem('otx_key', document.getElementById('otx-key').value);
            localStorage.setItem('urlscan_key', document.getElementById('urlscan-key').value);
            alert('API Keys safely saved to your local browser storage!');
        }

        function clearKeys() {
            localStorage.clear();
            document.getElementById('vt-key').value = '';
            document.getElementById('abuseipdb-key').value = '';
            document.getElementById('otx-key').value = '';
            document.getElementById('urlscan-key').value = '';
            alert('Cleared saved keys.');
        }

        function clearResults() {
            document.getElementById('results-table-body').innerHTML = `
                <tr>
                    <td colspan="3" class="text-center py-12 text-slate-500">No indicators evaluated yet. Enter data and click Run.</td>
                </tr>`;
        }

        // Automatic Regex-based IOC Type Detector
        function detectIOCType(val) {
            val = val.trim();
            const ipRegex = /^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$/;
            const hashRegex = /^[a-fA-F0-9]{32}$|^[a-fA-F0-9]{40}$|^[a-fA-F0-9]{64}$/;
            const urlRegex = /^https?:\/\//i;
            
            if (ipRegex.test(val)) return 'IP';
            if (hashRegex.test(val)) return 'Hash';
            if (urlRegex.test(val)) return 'URL';
            if (val.includes('.') && !val.includes(' ')) return 'Domain';
            return 'Unknown';
        }

        async function processIOCs() {
            const input = document.getElementById('ioc-input').value;
            const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const tbody = document.getElementById('results-table-body');
            
            if(lines.length === 0) {
                alert('Please enter at least one IOC line.');
                return;
            }

            tbody.innerHTML = ''; // Reset UI

            for (let ioc of lines) {
                const type = detectIOCType(ioc);
                const rowId = 'row-' + Math.random().toString(36).substr(2, 9);
                
                // Append initial skeleton row
                const rowHTML = `
                    <tr class="hover:bg-slate-800/50 transition">
                        <td class="py-4 font-mono font-medium text-slate-200 break-all pr-4 max-w-xs">${ioc}</td>
                        <td class="py-4"><span class="px-2 py-0.5 rounded text-xs font-semibold uppercase bg-slate-700 text-slate-300">${type}</span></td>
                        <td class="py-4 space-y-1.5" id="${rowId}">
                            <span class="text-xs text-slate-500 flex items-center gap-2"><i class="fa-solid fa-spinner animate-spin"></i> Checking engines...</span>
                        </td>
                    </tr>`;
                tbody.insertAdjacentHTML('beforeend', rowHTML);

                // Asynchronously check engines for this row
                fetchEngineData(ioc, type, rowId);
            }
        }

        async function fetchEngineData(ioc, type, rowId) {
            const cell = document.getElementById(rowId);
            cell.innerHTML = ''; // clear loading state

            // Read operational API keys
            const keys = {
                vt: document.getElementById('vt-key').value.trim(),
                abuseipdb: document.getElementById('abuseipdb-key').value.trim(),
                otx: document.getElementById('otx-key').value.trim(),
                urlscan: document.getElementById('urlscan-key').value.trim()
            };

            // ---- ENGINE 1: abuse.ch (Free, No Key Needed) ----
            if (type === 'Hash' || type === 'URL' || type === 'IP') {
                createBadge(cell, 'abuse.ch', 'Checking...', 'slate');
                try {
                    let response, data, isMalicious = false;
                    if (type === 'Hash') {
                        // Query MalwareBazaar API
                        response = await fetch('https://mb-api.abuse.ch/api/v1/', {
                            method: 'POST',
                            body: new URLSearchParams({ 'query': 'get_info', 'hash': ioc })
                        });
                        data = await response.json();
                        isMalicious = (data.query_status === 'ok');
                    } else if (type === 'URL') {
                        // Query URLhaus API
                        response = await fetch('https://urlhaus-api.abuse.ch/v1/url/', {
                            method: 'POST',
                            body: new URLSearchParams({ 'url': ioc })
                        });
                        data = await response.json();
                        isMalicious = (data.query_status === 'ok' && data.url_status === 'online');
                    }
                    updateBadge(cell, 'abuse.ch', isMalicious ? 'Malicious Match' : 'Clean / No Match', isMalicious ? 'red' : 'emerald');
                } catch (e) {
                    updateBadge(cell, 'abuse.ch', 'CORS/API Error', 'yellow');
                }
            }

            // ---- ENGINE 2: VirusTotal (Requires Key) ----
            if (keys.vt) {
                createBadge(cell, 'VirusTotal', 'Checking...', 'slate');
                try {
                    let endpoint = '';
                    if (type === 'IP') endpoint = `https://www.virustotal.com/api/v3/ip_addresses/${ioc}`;
                    if (type === 'Domain') endpoint = `https://www.virustotal.com/api/v3/domains/${ioc}`;
                    if (type === 'Hash') endpoint = `https://www.virustotal.com/api/v3/files/${ioc}`;
                    if (type === 'URL') endpoint = `https://www.virustotal.com/api/v3/urls/${btoa(ioc).replace(/=/g, "")}`;

                    if (endpoint) {
                        const res = await fetch(endpoint, { headers: { 'x-apikey': keys.vt } });
                        if(res.ok) {
                            const data = await res.json();
                            const stats = data.data.attributes.last_analysis_stats;
                            const text = `Malicious: ${stats.malicious} / Harmless: ${stats.harmless}`;
                            updateBadge(cell, 'VirusTotal', text, stats.malicious > 0 ? 'red' : 'emerald');
                        } else {
                            updateBadge(cell, 'VirusTotal', `Error (${res.status})`, 'yellow');
                        }
                    }
                } catch (e) {
                    updateBadge(cell, 'VirusTotal', 'CORS / Blocked', 'yellow');
                }
            }

            // ---- ENGINE 3: AbuseIPDB (Requires Key) ----
            if (keys.abuseipdb && type === 'IP') {
                createBadge(cell, 'AbuseIPDB', 'Checking...', 'slate');
                try {
                    const res = await fetch(`https://api.abuseipdb.com/api/v2/check?ipAddress=${ioc}`, {
                        headers: { 'Key': keys.abuseipdb, 'Accept': 'application/json' }
                    });
                    if (res.ok) {
                        const resData = await res.json();
                        const score = resData.data.abuseConfidenceScore;
                        updateBadge(cell, 'AbuseIPDB', `Abuse Confidence: ${score}%`, score > 10 ? 'red' : 'emerald');
                    } else {
                        updateBadge(cell, 'AbuseIPDB', 'Error Response', 'yellow');
                    }
                } catch (e) {
                    updateBadge(cell, 'AbuseIPDB', 'CORS / Blocked', 'yellow');
                }
            }

            // ---- ENGINE 4: AlienVault OTX (Requires Key) ----
            if (keys.otx && (type === 'IP' || type === 'Domain' || type === 'Hash')) {
                createBadge(cell, 'AlienVault OTX', 'Checking...', 'slate');
                try {
                    let section = type === 'IP' ? 'IPv4' : type === 'Domain' ? 'domain' : 'file';
                    const res = await fetch(`https://otx.alienvault.com/api/v1/indicators/${section}/${ioc}/general`, {
                        headers: { 'X-OTX-API-KEY': keys.otx }
                    });
                    if (res.ok) {
                        const resData = await res.json();
                        const count = resData.pulse_info.count || 0;
                        updateBadge(cell, 'AlienVault OTX', `${count} Related Pulses`, count > 0 ? 'red' : 'emerald');
                    } else {
                        updateBadge(cell, 'AlienVault OTX', 'Error Response', 'yellow');
                    }
                } catch (e) {
                    updateBadge(cell, 'AlienVault OTX', 'CORS / Blocked', 'yellow');
                }
            }

            // ---- ENGINE 5: URLScan.io (Requires Key) ----
            if (keys.urlscan && (type === 'URL' || type === 'Domain')) {
                createBadge(cell, 'URLScan.io', 'Checking...', 'slate');
                try {
                    // Note: URLScan requires a POST submission, then polling. For this light script, we query their search API for history.
                    const res = await fetch(`https://urlscan.io/api/v1/search/?q=domain:${ioc}`, {
                        headers: { 'API-Key': keys.urlscan }
                    });
                    if (res.ok) {
                        const resData = await res.json();
                        const matches = resData.total || 0;
                        updateBadge(cell, 'URLScan.io', `${matches} historical scans`, matches > 0 ? 'amber' : 'emerald');
                    } else {
                        updateBadge(cell, 'URLScan.io', 'API Limit/Error', 'yellow');
                    }
                } catch (e) {
                    updateBadge(cell, 'URLScan.io', 'CORS / Blocked', 'yellow');
                }
            }

            if(cell.children.length === 0) {
                cell.innerHTML = '<span class="text-xs text-slate-500">No active engine supported this IOC or missing API keys.</span>';
            }
        }

        // Helper UI functions to handle individual status badges dynamically
        function createBadge(container, engineName, text, color) {
            const badgeId = `${container.id}-${engineName.replace(/\s+/g, '')}`;
            const html = `
                <div id="${badgeId}" class="flex items-center justify-between bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs">
                    <span class="font-medium text-slate-400">${engineName}:</span>
                    <span class="badge-status text-slate-300 font-mono">${text}</span>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
        }

        function updateBadge(container, engineName, text, colorTheme) {
            const badgeId = `${container.id}-${engineName.replace(/\s+/g, '')}`;
            const badge = document.getElementById(badgeId);
            if (!badge) return;

            const statusSpan = badge.querySelector('.badge-status');
            statusSpan.innerText = text;

            // Apply semantic colors based on result threat level
            if(colorTheme === 'red') {
                badge.classList.add('border-red-900/50', 'bg-red-950/20');
                statusSpan.classList.add('text-red-400', 'font-bold');
            } else if (colorTheme === 'emerald') {
                badge.classList.add('border-emerald-900/50', 'bg-emerald-950/10');
                statusSpan.classList.add('text-emerald-400');
            } else if (colorTheme === 'amber') {
                badge.classList.add('border-amber-900/50', 'bg-amber-950/10');
                statusSpan.classList.add('text-amber-400');
            } else if (colorTheme === 'yellow') {
                badge.classList.add('border-yellow-900/30');
                statusSpan.classList.add('text-slate-500', 'italic');
            }
        }
    </script>
</body>
</html>
